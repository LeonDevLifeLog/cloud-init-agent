name: build-image

on:
  push:
    branches: [main]
    tags: ['v*']
    # 纯文档改动不触发镜像重建。注意：paths-ignore 对 tag push 同样生效——
    # 若某个 vX.Y.Z tag 恰好落在只改文档的提交上，发布会被跳过；届时在代码提交上打 tag
    # 或补一个空提交即可。
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [base, node, go, java, full]
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-edge.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},prefix=${{ matrix.target }}-
            type=raw,value=${{ matrix.target }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern=v{{version}},enable=${{ matrix.target == 'full' }}
            type=raw,value=latest,enable=${{ matrix.target == 'full' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ matrix.target }}-edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ matrix.target }}-
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          VERSION="$GITHUB_REF_NAME"
          {
            echo '## 镜像'
            echo
            echo '```bash'
            echo "docker pull ${IMAGE}:${VERSION}          # full（全能）"
            echo "docker pull ${IMAGE}:latest              # = 最新 release"
            echo "docker pull ${IMAGE}:node-${VERSION}     # 仅 Node"
            echo "docker pull ${IMAGE}:go-${VERSION}       # 仅 Go"
            echo "docker pull ${IMAGE}:java-${VERSION}     # 仅 Java"
            echo "docker pull ${IMAGE}:base-${VERSION}     # 基础层"
            echo '```'
          } > notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md \
            || gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
